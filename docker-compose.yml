services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: meteora-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meteora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: meteora-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerting.yml:/etc/prometheus/alerting.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: meteora-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # Loki
  loki:
    image: grafana/loki:latest
    container_name: meteora-loki
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki

  # Jaeger
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: meteora-jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: true

  # Alertmanager (Optional)
  alertmanager:
    image: prom/alertmanager:latest
    container_name: meteora-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/config.yml
    command:
      - '--config.file=/etc/alertmanager/config.yml'

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  default:
    name: meteora-network
