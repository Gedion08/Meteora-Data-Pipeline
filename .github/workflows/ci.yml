name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install deps
        run: npm ci
      - name: npm audit
        run: npm audit --audit-level=moderate || true
      - name: Generate SBOM
        run: npm install -g cyclonedx-npm && cyclonedx-npm --output-file bom.xml
      - name: Upload SBOM
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: bom.xml
      - name: Run tests
        run: npm test --silent
      - name: TypeScript build
        run: npm run build
      - name: Build and push Docker image (main only)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/meteora-pipeline:latest
          file: Dockerfile
      - name: Publish npm release (semantic-release)
        if: github.ref == 'refs/heads/main'
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/github
