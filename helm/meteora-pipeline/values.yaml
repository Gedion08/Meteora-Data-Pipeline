replicaCount: 2

image:
  repository: ghcr.io/your-org/meteora-pipeline
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9091"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 9091
  targetPort: 9091

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: metrics.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Environment variables
env:
  NODE_ENV: production
  LOG_LEVEL: info
  METRICS_PORT: "9091"
  ENABLE_TRACING: "true"
  ENABLE_LOKI_LOGGING: "true"
  API_RETRY_ATTEMPTS: "5"
  DATABASE_POOL_MIN: "5"
  DATABASE_POOL_MAX: "20"

# Secrets (create these manually or use external-secrets operator)
secrets:
  - name: DATABASE_URL
    key: database-url
  - name: LOKI_URL
    key: loki-url
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    key: otel-endpoint

# Persistence
persistence:
  enabled: false
  storageClassName: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /app/data

# PostgreSQL subchart (optional)
postgresql:
  enabled: false
  auth:
    username: meteora
    password: changeme
    database: meteora

# Health checks
livenessProbe:
  httpGet:
    path: /health
    port: 9091
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 9091
  initialDelaySeconds: 5
  periodSeconds: 5
