global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'meteora-pipeline'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

rule_files:
  - 'alerting.yml'

scrape_configs:
  - job_name: 'meteora-pipeline'
    static_configs:
      - targets: ['localhost:9091']
    scrape_interval: 15s
    scrape_timeout: 10s
