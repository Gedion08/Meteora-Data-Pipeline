groups:
  - name: meteora_pipeline
    interval: 30s
    rules:
      - alert: PipelineHighErrorRate
        expr: rate(pools_fetched_total{job="meteora-pipeline"}[5m]) == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Meteora pipeline stopped fetching pools"
          description: "No pools fetched in the last 5 minutes. Check logs and API endpoints."

      - alert: PipelineFetchLatencyHigh
        expr: histogram_quantile(0.95, rate(pools_fetch_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Meteora pipeline fetch latency is high"
          description: "95th percentile fetch duration > 10s. May indicate API or network issues."

      - alert: PipelineLastFetchStale
        expr: (time() - pools_last_fetch_timestamp) > 3600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Meteora pipeline last fetch is stale"
          description: "No successful fetch in the last hour for {{ $labels.source }}."

      - alert: DatabaseConnectionFailure
        expr: increase(database_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database connection error detected"
          description: "Pipeline cannot connect to Postgres. Check DATABASE_URL and DB health."
